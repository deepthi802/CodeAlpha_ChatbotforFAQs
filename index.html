<!DOCTYPE html>
<html>
<head>
    <title>FAQ Chatbot</title>

    <style>
        body{
            font-family: Arial;
            background:#f4f4f4;
        }

        .chat-container{
            width:400px;
            margin:50px auto;
            background:white;
            padding:20px;
            border-radius:10px;
        }

        input{
            width:70%;
            padding:10px;
        }

        button{
            padding:10px;
        }

        .response{
            margin-top:20px;
            background:#eeeeee;
            padding:10px;
            border-radius:5px;
        }
    </style>
</head>

<body>

<div class="chat-container">

    <h1>FAQ Chatbot</h1>

    <input type="text"
           id="userInput"
           placeholder="Ask a question...">

    <button onclick="getResponse()">
        Send
    </button>

    <div class="response" id="responseBox"></div>

</div>

<script>

const faqs = {
    "what is ai":
    "AI stands for Artificial Intelligence.",

    "what is machine learning":
    "Machine learning is a subset of AI.",

    "what is python":
    "Python is a programming language.",

    "how to install python":
    "Download Python from python.org"
};

function getResponse(){

    let input =
        document.getElementById("userInput")
        .value
        .toLowerCase();

    let response =
        "Sorry, I don't understand.";

    for(let question in faqs){

        if(input.includes(question)){

            response = faqs[question];
        }
    }

    document.getElementById("responseBox")
        .innerHTML =
        "<strong>Bot:</strong> " + response;
}

</script>

</body>
</html>
